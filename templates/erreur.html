{% extends "base.html" %}

{% block titre %}Erreur {{ code }}{% endblock %}

{% block contenu %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center py-5">
    <h1 class="display-1 text-danger">{{ code }}</h1>
    <p class="lead">{{ message }}</p>
    <a href="{{ url_for('afficher_accueil') }}" class="btn btn-primary">
      Retour à l'accueil
    </a>
  </div>
</div>
{% endblock %}
